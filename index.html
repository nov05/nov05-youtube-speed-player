<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>YouTube Speed Player</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;

            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Page container */
        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-top: 40px;
        }

        /* Top controls */
        .controls {
            margin-top: 20px;
        }

        input {
            width: 70%;
            max-width: 500px;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 18px;
            font-size: 15px;
            margin: 6px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Player wrapper centers video */
        .player-wrapper {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        /* Speed buttons */
        .speed-buttons {
            margin-top: 15px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>⚡ YouTube Speed Player</h2>
        <p>Start at 3x. Go even faster.</p>

        <div class="controls">
            <input id="url" autofocus placeholder="Paste YouTube link and press Enter">
            <button onclick="loadVideo()">Play</button>
        </div>

        <div class="player-wrapper">
            <div id="player"></div>
        </div>

        <div class="speed-buttons">
            <button onclick="setSpeed(1)">1x</button>
            <button onclick="setSpeed(2)">2x</button>
            <button onclick="setSpeed(3)">3x</button>
            <button onclick="setSpeed(4)">4x</button>
            <button onclick="setSpeed(4)">5x</button>
            <button onclick="setSpeed(4)">6x</button>
        </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>

        let player;

        // YouTube API Ready
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '480',
                width: '800',
                videoId: ''
            });
        }

        // Retreive video ID
        function extractVideoID(url) {
            let regExp =
                /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = url.match(regExp);
            return (match && match[2].length == 11)
                ? match[2]
                : null;
        }

        // Load video
        function loadVideo() {
            const url = document.getElementById("url").value;
            const id = extractVideoID(url);

            if (!id) {
                alert("Invalid YouTube URL");
                return;
            }

            player.loadVideoById(id);

            // Default 3x speed
            setTimeout(() => {
                player.setPlaybackRate(3);
            }, 1500);
        }

        // Force speed
        function forceSpeed(rate) {
            const iframe =
                document.querySelector('#player iframe');

            if (!iframe) return;

            const video =
                iframe.contentWindow.document
                    .querySelector('video');

            if (video) {
                video.playbackRate = rate;
            }
        }

        // Set speed
        function setSpeed(rate) {
            player.setPlaybackRate(rate);

            // bypass 2x limit
            setTimeout(() => {
                // After 100 millisecond, it calls the forceSpeed function
                forceSpeed(rate);
            }, 100);
        }

    </script>

</body>

</html>
